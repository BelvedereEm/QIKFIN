<!DOCTYPE html>
<html>
<head>
  <title>QIKFIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <style>
   * {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: #0f172a;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* CARD */
#auth {
  width: 100%;
  max-width: 340px;
  background: #111c33;
  padding: 24px;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* INPUTS */
.qik-input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #24324d;
  background: #0b1220;
  color: white;
  font-size: 14px;
  box-sizing: border-box;
  -webkit-appearance: none;
  appearance: none;
}

/* PASSWORD ROW */
.password-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.password-row input[type="password"] {
  flex: 1;
  min-width: 0;
}

.password-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  cursor: pointer;
}

#loginBtn {
  background: #38bdf8;
  color: #0f172a;
  font-weight: 600;
}

#signupBtn {
  background: transparent;
  color: white;
  border: 1px solid #2a3b5a;
}

/* TEXT */
h1, h2, h3 {
  color: white;
  margin: 0;
  text-align: center;
}

/* h2 = main brand */
h2 {
  font-size: 28px;
  font-weight: 700;
}

/* h1 = smaller subtitle */
h1 {
  font-size: 14px;
  font-weight: 500;
  opacity: 0.7;
  margin-bottom: -4px;
}

/* optional spacing under header stack */
h3 {
  font-size: 14px;
  font-weight: 500;
  opacity: 0.8;
  margin-top: 6px;
}

#msg {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  text-align: center;
}

   .card {
  background: #111c33;
  padding: 20px;
  border-radius: 16px;
  width: 100%;
  max-width: 340px;
  margin: auto;
  text-align: center;
  color: white;
}

.balance {
  margin: 20px 0;
  padding: 15px;
  border-radius: 12px;
  background: #0b1220;
}
</style>
</head>

<body>

<!-- LOGIN / SIGNUP -->
<div id="auth">
  <h1>Welcome to</h1>
  <h2>QIKFIN</h2>
  <h3>Login or Sign Up</h3>

  <form id="loginForm">

    <input 
  type="email" 
  id="email" 
  name="email"
  class="qik-input" 
  placeholder="Email"
  autocomplete="username"
>

<div class="password-row">
  <input 
    type="password" 
    id="password" 
    name="password"
    class="qik-input" 
    placeholder="Password"
    autocomplete="current-password"
  >

  <input type="checkbox" id="showPassword">
</div>

    <button type="submit" id="loginBtn">Login</button>
    <button type="button" id="signupBtn">Sign Up</button>

    <p id="msg"></p>

  </form>
</div>

  <!-- DASHBOARD / MAIN PAGE -->
  <div id="dashboard" style="display:none;">
  <div class="card">
    <h2>Dashboard</h2>

    <p id="userInfo"></p>

    <div class="balance">
      <h3>Balance</h3>
      <p>$0.00</p>
    </div>

    <button id="addTxnBtn">+ Add Transaction</button>
    <button id="logoutBtn">Logout</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  import { getFirestore } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
  import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app-check.js";

  // 🔥 YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyBUxKRW99n3MdM3h5lIthrSLhtysqKOHwE",
    authDomain: "qikfin.firebaseapp.com",
    projectId: "qikfin",
    storageBucket: "qikfin.firebasestorage.app",
    messagingSenderId: "867906265805",
    appId: "1:867906265805:web:fef99742609ce5151e3f84"
  };

const app = initializeApp(firebaseConfig);

// 🔐 App Check (ADD THIS HERE)
initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider('6LeiFs8sAAAAAI4EgcoVTRjQYkRPqeHeeUtyozDu'),
  isTokenAutoRefreshEnabled: true
});

const auth = getAuth(app);
const db = getFirestore(app);

  const msg = document.getElementById("msg");
  document.getElementById("showPassword").addEventListener("change", function () {
  const passwordInput = document.getElementById("password");

  if (this.checked) {
    passwordInput.type = "text";
  } else {
    passwordInput.type = "password";
  }
});

  // SIGN UP
 document.getElementById("signupBtn").addEventListener("click", (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      msg.innerText = "Account created!";
    })
    .catch((error) => {
      msg.innerText = error.message;
    });
});

  // LOGIN
 document.getElementById("loginForm").addEventListener("submit", (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .catch((error) => {
      document.getElementById("msg").innerText = error.message;
    });
});

  //Logout Button
window.addEventListener("DOMContentLoaded", () => {
  const logoutBtn = document.getElementById("logoutBtn");

  if (logoutBtn) {
    logoutBtn.addEventListener("click", () => {
      signOut(auth);
    });
  }
});

  // AUTH STATE (controls UI)
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    document.getElementById("userInfo").innerText =
      "Logged in as: " + user.email;

  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }
});

  console.log("QIKFIN loaded");
</script>

</body>
</html>
