<!DOCTYPE html>
<html>
<head>
  <title>QIKFIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <style>
   {
   box-sizing: border-box;
   }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* CARD */
#auth {
  width: 100%;
  max-width: 340px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 24px;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  gap: 12px;
  color: white;
}

/* TITLES */
#auth h1 {
  margin: 0;
  font-size: 18px;
  font-weight: 400;
  opacity: 0.8;
  align-items: center;
}

#auth h2 {
  margin: 0;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 1px;
  align-items: center;
}

#auth h3 {
  margin: 6px 0 0;
  font-size: 14px;
  font-weight: 400;
  opacity: 0.7;
}

/* INPUTS */
#auth input[type="email"],
#auth input[type="password"] {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
  font-size: 14px;
}

#auth input::placeholder {
  color: rgba(255,255,255,0.5);
}

/* PASSWORD ROW */
.password-row {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: flex-start;
}

.password-row input[type="password"] {
  flex: 1;
  min-width: 0;
}

/* CHECKBOX */
.password-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #38bdf8;
  cursor: pointer;
  flex-shrink: 0;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  cursor: pointer;
  transition: 0.2s ease;
}

#loginBtn {
  background: #38bdf8;
  color: #0f172a;
  font-weight: 600;
}

#loginBtn:hover {
  background: #0ea5e9;
}

#signupBtn {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
}

#signupBtn:hover {
  background: rgba(255,255,255,0.2);
}

/* MESSAGE */
#msg {
  font-size: 13px;
  opacity: 0.8;
  text-align: center;
}
</style>
</head>

<body>

<!-- LOGIN / SIGNUP -->
<div id="auth">
  <h1>Welcome to</h1>
  <h2>QIKFIN</h2>
  <h3>Login or Sign Up</h3>

  <input type="email" id="email" placeholder="Email">

  <div class="password-row">
    <input type="password" id="password" placeholder="Password">
    <input type="checkbox" id="showPassword">
  </div>

  <button id="loginBtn">Login</button>
  <button id="signupBtn">Sign Up</button>

  <p id="msg"></p>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  import { getFirestore } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
  import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app-check.js";

  // 🔥 YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyBUxKRW99n3MdM3h5lIthrSLhtysqKOHwE",
    authDomain: "qikfin.firebaseapp.com",
    projectId: "qikfin",
    storageBucket: "qikfin.firebasestorage.app",
    messagingSenderId: "867906265805",
    appId: "1:867906265805:web:fef99742609ce5151e3f84"
  };

const app = initializeApp(firebaseConfig);

// 🔐 App Check (ADD THIS HERE)
initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider('6LeiFs8sAAAAAI4EgcoVTRjQYkRPqeHeeUtyozDu'),
  isTokenAutoRefreshEnabled: true
});

const auth = getAuth(app);
const db = getFirestore(app);

  const msg = document.getElementById("msg");
  document.getElementById("showPassword").addEventListener("change", function () {
  const passwordInput = document.getElementById("password");

  if (this.checked) {
    passwordInput.type = "text";
  } else {
    passwordInput.type = "password";
  }
});

  // SIGN UP
  document.getElementById("signupBtn").onclick = () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        msg.innerText = "Account created!";
      })
      .catch((error) => {
        msg.innerText = error.message;
      });
  };

  // LOGIN
  document.getElementById("loginBtn").onclick = () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        msg.innerText = "Logged in!";
      })
      .catch((error) => {
        msg.innerText = error.message;
      });
  };

  // LOGOUT
  document.getElementById("logoutBtn").onclick = () => {
    signOut(auth);
  };

  // AUTH STATE (controls UI)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("auth").style.display = "none";
      document.getElementById("app").style.display = "block";

      document.getElementById("userInfo").innerText =
        "Logged in as: " + user.email;

    } else {
      document.getElementById("auth").style.display = "block";
      document.getElementById("app").style.display = "none";
    }
  });

  console.log("QIKFIN loaded");
</script>

</body>
</html>
