<!DOCTYPE html>
<html lang="en">
<head>
  <title>QIKFIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #0f172a;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 340px;
      background: #111c33;
      padding: 24px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      color: white;
      text-align: center;
    }

    /* ── INPUTS ── */
    .qik-input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #24324d;
      background: #0b1220;
      color: white;
      font-size: 14px;
      -webkit-appearance: none;
      appearance: none;
    }

    /* ── PASSWORD ROW ── */
    .password-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .password-row input[type="password"],
    .password-row input[type="text"] {
      flex: 1;
      min-width: 0;
    }

    .password-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      cursor: pointer;
    }

    /* ── BUTTONS ── */
    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    button.primary {
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
    }

    button.secondary {
      background: transparent;
      color: white;
      border: 1px solid #2a3b5a;
    }

    /* ── TYPOGRAPHY ── */
    h1, h2, h3 { color: white; margin: 0; text-align: center; }
    h2  { font-size: 28px; font-weight: 700; }
    h1  { font-size: 14px; font-weight: 500; opacity: 0.7; margin-bottom: -4px; }
    h3  { font-size: 14px; font-weight: 500; opacity: 0.8; margin-top: 6px; }

    /* ── MISC ── */
    #msg {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      text-align: center;
    }

    .balanceBox {
      background: #0b1220;
      padding: 12px;
      border-radius: 12px;
    }

    .page { display: none; }
  </style>
</head>

<body>

  <!-- ════════════════════════
       AUTH PAGE
  ════════════════════════ -->
  <div id="auth" class="card page">
    <h1>Welcome to</h1>
    <h2>QIKFIN</h2>
    <h3>Login or Sign Up</h3>

    <form id="loginForm" autocomplete="on">
      <input
        type="email" id="email" name="email"
        class="qik-input" placeholder="Email"
        autocomplete="username"
      >

      <div class="password-row">
        <input
          type="password" id="password" name="password"
          class="qik-input" placeholder="Password"
          autocomplete="current-password"
        >
        <input type="checkbox" id="showPassword" title="Show password">
      </div>

      <button type="submit" class="primary">Login</button>
      <button type="button" id="signupBtn" class="secondary">Sign Up</button>
      <p id="msg"></p>
    </form>
  </div>

  <!-- ════════════════════════
       DASHBOARD PAGE
  ════════════════════════ -->
  <div id="dashboard" class="card page">
    <h2>Dashboard</h2>
    <p id="userInfo"></p>

    <div class="balanceBox">
      <h3>Current</h3>
      <p id="currentBalance">$0.00</p>
    </div>

    <div class="balanceBox">
      <h3>Savings</h3>
      <p id="savingsBalance">$0.00</p>
    </div>

    <div class="balanceBox">
      <h3>Available</h3>
      <p id="availableBalance">$0.00</p>
    </div>

    <div class="balanceBox">
      <h3>Left Until Next Paycheck</h3>
      <p id="leftToSpend">$0.00</p>
    </div>

    <button id="goPay" class="primary">Income & Bills</button>
    <button id="goTx"  class="primary">Transactions</button>
    <button id="goRegister" class="primary">Register</button>
    <button id="logoutBtn" class="secondary">Logout</button>
  </div>

  <!-- ════════════════════════
       TRANSACTIONS PAGE
  ════════════════════════ -->
  <div id="txPage" class="card page">
    <h2>Transactions</h2>

    <select id="type" class="qik-input">
      <option value="expense">Expense</option>
      <option value="income">Income</option>
      <option value="transfer">Transfer</option>
    </select>

    <input id="amount"   type="number" class="qik-input" placeholder="Amount">
    <input id="category" class="qik-input" placeholder="Category">
    <input id="note"     class="qik-input" placeholder="Note">

    <button id="addTxnBtn" class="primary">Save</button>
    <button class="back secondary">Back</button>
  </div>

  <!-- ════════════════════════
       Income & Bills Page
  ════════════════════════ -->
  <div id="payPage" class="card page">
    <h2>Income & Bills Setup</h2>

    <select id="recurringType" class="qik-input">
    <option value="income">Income</option>
    <option value="bill">Bill</option>
    </select>

    <input id="recurringName" class="qik-input" placeholder="Name (Paycheck, Rent)">
    <input id="recurringAmount" class="qik-input" type="number" placeholder="Amount">
    <input id="recurringDate" class="qik-input" type="date">
    <select id="recurringFrequency" class="qik-input">
    <option value="weekly">Weekly</option>
    <option value="biweekly">Biweekly</option>
    <option value="monthly">Monthly</option>
    </select>

    <button id="saveRecurringBtn" class="primary">Save</button>
    
    <div id="recurringList"></div>
    
    <button class="back secondary">Back</button>
  </div>

   <!-- ════════════════════════
       Income & Bills Page
  ════════════════════════ -->
  <div id="registerPage" class="card page">
  <h2>Register</h2>
  <div id="registerList"></div>
  <button class="back secondary">Back</button>
</div>
  

  <!-- ════════════════════════
       FIREBASE
  ════════════════════════ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import {
      getFirestore,
      doc, setDoc, getDocs, query,
      collection, addDoc, serverTimestamp, deleteDoc, orderBy
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import {
      initializeAppCheck,
      ReCaptchaV3Provider
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app-check.js";

    /* ── 1. INIT ── */
    const app = initializeApp({
      apiKey:            "AIzaSyBUxKRW99n3MdM3h5lIthrSLhtysqKOHwE",
      authDomain:        "qikfin.firebaseapp.com",
      projectId:         "qikfin",
      storageBucket:     "qikfin.firebasestorage.app",
      messagingSenderId: "867906265805",
      appId:             "1:867906265805:web:fef99742609ce5151e3f84"
    });

    initializeAppCheck(app, {
      provider: new ReCaptchaV3Provider("6LeiFs8sAAAAAI4EgcoVTRjQYkRPqeHeeUtyozDu"),
      isTokenAutoRefreshEnabled: true
    });

    const auth = getAuth(app);
    const db   = getFirestore(app);

    /* ── 2. PAGE NAVIGATION ── */
    const PAGES = ["auth", "dashboard", "txPage", "payPage", "registerPage"];

    function show(pageId) {
      PAGES.forEach(id => {
        document.getElementById(id).style.display = "none";
      });
      document.getElementById(pageId).style.display = "block";
    }

    /* ── 3. BALANCE CALCULATION ── */
    async function calculateBalances(uid) {
      const snap = await getDocs(
  collection(db, "users", uid, "transactions")
);

      let income = 0, expenses = 0, savings = 0;

      snap.forEach(docSnap => {
        const d = docSnap.data();
        if (d.type === "income")   income   += d.amount;
        if (d.type === "expense")  expenses += d.amount;
        if (d.type === "transfer") {
          if (d.to   === "savings") savings += d.amount;
          if (d.from === "savings") savings -= d.amount;
        }
      });

      const current = income - expenses;
      const available = current - savings;
      document.getElementById("currentBalance").textContent   = "$" + current.toFixed(2);
      document.getElementById("savingsBalance").textContent   = "$" + savings.toFixed(2);
      document.getElementById("availableBalance").textContent = "$" + available.toFixed(2);
    }

    /* ── 4. Income & Bills HELPERS ── */

    async function loadRecurring(uid) {
  const container = document.getElementById("recurringList");
  container.innerHTML = "";

  const snap = await getDocs(
  query(
    collection(db, "users", uid, "recurring"),
    orderBy("nextDate")
  )
);

 snap.forEach(docSnap => {
  const d = docSnap.data();

  const row = document.createElement("div");
  row.className = "balanceBox";

  // ✅ FIX #3 (PLACED HERE)
  const next = d.nextDate?.toDate
    ? d.nextDate.toDate()
    : new Date(d.nextDate);

  row.innerHTML = `
    <strong>${d.name}</strong><br>
    $${Number(d.amount || 0).toFixed(2)} • ${d.frequency}<br>
    Next: ${next.toLocaleDateString()}
    <br><br>
    <button onclick="deleteRecurring('${docSnap.id}')">Delete</button>
  `;

  container.appendChild(row);
});
}

window.deleteRecurring = async (id) => {
  const user = auth.currentUser;
  await deleteDoc(doc(db, "users", user.uid, "recurring", id));
  loadRecurring(user.uid);
};

    /* ── 5. TRANSACTIONS ── */
    document.getElementById("addTxnBtn").addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user) return;

      const type     = document.getElementById("type").value;
      const amount   = Number(document.getElementById("amount").value);
      const category = document.getElementById("category").value;
      const note     = document.getElementById("note").value;

      if (!amount || amount <= 0) return;

      await addDoc(collection(db, "users", user.uid, "transactions"), {
        type, amount, category, note,
        date: serverTimestamp()
      });

      await calculateBalances(user.uid);
      loadRegister(user.uid);

      document.getElementById("amount").value = "";
      document.getElementById("category").value = "";
      document.getElementById("note").value = "";      
    });
    /* ── 6. Load Register ── */
    async function loadRegister(uid) {
  const container = document.getElementById("registerList");
  container.innerHTML = "";

  const snap = await getDocs(
  query(
    collection(db, "users", uid, "transactions"),
    orderBy("date", "desc")
  )
);

  snap.forEach(docSnap => {
    const d = docSnap.data();

    const row = document.createElement("div");
    row.className = "balanceBox";

    row.innerHTML = `
      ${d.type.toUpperCase()} - $${Number(d.amount || 0).toFixed(2)}<br>
      ${d.category || ""}<br>
      ${d.note || ""}
      <br><br>
      <button onclick="deleteTxn('${docSnap.id}')">Delete</button>
    `;

    container.appendChild(row);
  });
}
    window.deleteTxn = async (id) => {
  const user = auth.currentUser;
  await deleteDoc(doc(db, "users", user.uid, "transactions", id));
  loadRegister(user.uid);
  calculateBalances(user.uid);
};
    
    /* ── 7. Income & Bills SAVE ── */
    document.getElementById("saveRecurringBtn").addEventListener("click", async () => {
    const user = auth.currentUser;
    if (!user) return;

    const type = document.getElementById("recurringType").value;
    const name = document.getElementById("recurringName").value;
    const amount = Number(document.getElementById("recurringAmount").value);
    const date = document.getElementById("recurringDate").value;
    const frequency = document.getElementById("recurringFrequency").value;

    if (!name || !amount || !date) return;

await addDoc(collection(db, "users", user.uid, "recurring"), {
  type,
  name,
  amount,
  frequency,
  nextDate: new Date(date + "T00:00:00"),
  createdAt: serverTimestamp()
});

loadRecurring(user.uid);

// clear inputs
document.getElementById("recurringName").value = "";
document.getElementById("recurringAmount").value = "";
document.getElementById("recurringDate").value = "";
  });

    /* ── 8. AUTH LISTENERS ── */
    document.getElementById("loginForm").addEventListener("submit", e => {
      e.preventDefault();
      const email    = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .catch(err => { document.getElementById("msg").textContent = err.message; });
    });

    document.getElementById("signupBtn").addEventListener("click", async () => {
      const email    = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const msg      = document.getElementById("msg");

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", cred.user.uid), {
          email:            cred.user.email,
          availableBalance: 0,
          currentBalance:   0,
          savingsBalance:   0,
          createdAt:        serverTimestamp()
        });
        msg.textContent = "Account created!";
      } catch (err) {
        msg.textContent = err.message;
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

    document.getElementById("showPassword").addEventListener("change", function () {
      document.getElementById("password").type = this.checked ? "text" : "password";
    });

    /* ── 9. NAV LISTENERS ── */
    document.getElementById("goPay").addEventListener("click", () => show("payPage"));
    document.getElementById("goTx").addEventListener("click",  () => show("txPage"));
    document.getElementById("goRegister").onclick = () => {
    show("registerPage");

    const user = auth.currentUser;
    if (user) {
      loadRegister(user.uid);
    }
  };

    document.querySelectorAll(".back").forEach(btn => {
      btn.addEventListener("click", () => show("dashboard"));
    });

    /* ── 10. AUTH STATE ── */
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById("userInfo").textContent = "Logged in: " + user.email;

        // Reset to avoid stale numbers while async calls load
        ["currentBalance", "savingsBalance", "availableBalance", "leftToSpend"]
          .forEach(id => { document.getElementById(id).textContent = "$0.00"; });

        show("dashboard");
        calculateBalances(user.uid).catch(console.error);
        loadRecurring(user.uid);
      } else {
        show("auth");
      }
    });
  </script>
</body>
</html>
