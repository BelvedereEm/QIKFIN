<!DOCTYPE html>
<html>
<head>
  <title>QIKFIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 30px;
      background: #f5f5f5;
    }

    /* AUTH CARD */
    #auth {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;

      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      margin: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
#auth input {
  width: 100%;
  box-sizing: border-box;
        padding: 10px;
      margin: 0;
}

    button {
      padding: 10px 15px;
      margin: 5px;
      cursor: pointer;
      width: 100px;
    }

    /* SHOW PASSWORD */
    .show-password {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 4px;
  font-size: 14px;
      margin-top: 6px;
}

.show-password input {
  margin: 0;
  padding: 0;
}

    /* APP */
    #app {
      display: none;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      min-width: 250px;
    }
  </style>
</head>

<body>

<h1>QIKFIN</h1>

<!-- LOGIN / SIGNUP -->
<div id="auth">
  <h3>Login or Sign Up</h3>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

<label class="show-password">
  <input type="checkbox" id="showPassword">
  <span>Show Password</span>
</label>

  <button id="loginBtn">Login</button>
  <button id="signupBtn">Sign Up</button>

  <p id="msg"></p>
</div>

<!-- APP -->
<div id="app">
  <div class="card">
    <h2>Welcome 👋</h2>
    <p id="userInfo"></p>

    <button id="logoutBtn">Logout</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  import { getFirestore } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
  import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app-check.js";

  // 🔥 YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyBUxKRW99n3MdM3h5lIthrSLhtysqKOHwE",
    authDomain: "qikfin.firebaseapp.com",
    projectId: "qikfin",
    storageBucket: "qikfin.firebasestorage.app",
    messagingSenderId: "867906265805",
    appId: "1:867906265805:web:fef99742609ce5151e3f84"
  };

const app = initializeApp(firebaseConfig);

// 🔐 App Check (ADD THIS HERE)
initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider('6LeiFs8sAAAAAI4EgcoVTRjQYkRPqeHeeUtyozDu'),
  isTokenAutoRefreshEnabled: true
});

const auth = getAuth(app);
const db = getFirestore(app);

  const msg = document.getElementById("msg");
  document.getElementById("showPassword").addEventListener("change", function () {
  const passwordInput = document.getElementById("password");

  if (this.checked) {
    passwordInput.type = "text";
  } else {
    passwordInput.type = "password";
  }
});

  // SIGN UP
  document.getElementById("signupBtn").onclick = () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        msg.innerText = "Account created!";
      })
      .catch((error) => {
        msg.innerText = error.message;
      });
  };

  // LOGIN
  document.getElementById("loginBtn").onclick = () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        msg.innerText = "Logged in!";
      })
      .catch((error) => {
        msg.innerText = error.message;
      });
  };

  // LOGOUT
  document.getElementById("logoutBtn").onclick = () => {
    signOut(auth);
  };

  // AUTH STATE (controls UI)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("auth").style.display = "none";
      document.getElementById("app").style.display = "block";

      document.getElementById("userInfo").innerText =
        "Logged in as: " + user.email;

    } else {
      document.getElementById("auth").style.display = "block";
      document.getElementById("app").style.display = "none";
    }
  });

  console.log("QIKFIN loaded");
</script>

</body>
</html>
