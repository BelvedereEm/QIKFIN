<!DOCTYPE html>
<html>
<head>
  <title>QIKFIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }


  #auth {
  width: 100%;
  max-width: 320px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);

  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* smaller inputs */
#auth input[type="email"],
#auth input[type="password"] {
  width: 100%;
  padding: 10px;
  font-size: 14px;
  box-sizing: border-box;
}

/* password row */
.password-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* shrink password input so checkbox fits nicely */
.password-row input[type="password"] {
  flex: 1;
}

/* checkbox styling */
.password-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  margin: 0;
}

/* buttons */
button {
  width: 100%;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- LOGIN / SIGNUP -->
<div id="auth">
  <h3>Login or Sign Up</h3>

  <input type="email" id="email" placeholder="Email">

  <div class="password-row">
    <input type="password" id="password" placeholder="Password">
    <input type="checkbox" id="showPassword">
  </div>

  <button id="loginBtn">Login</button>
  <button id="signupBtn">Sign Up</button>

  <p id="msg"></p>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  import { getFirestore } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
  import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app-check.js";

  // 🔥 YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyBUxKRW99n3MdM3h5lIthrSLhtysqKOHwE",
    authDomain: "qikfin.firebaseapp.com",
    projectId: "qikfin",
    storageBucket: "qikfin.firebasestorage.app",
    messagingSenderId: "867906265805",
    appId: "1:867906265805:web:fef99742609ce5151e3f84"
  };

const app = initializeApp(firebaseConfig);

// 🔐 App Check (ADD THIS HERE)
initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider('6LeiFs8sAAAAAI4EgcoVTRjQYkRPqeHeeUtyozDu'),
  isTokenAutoRefreshEnabled: true
});

const auth = getAuth(app);
const db = getFirestore(app);

  const msg = document.getElementById("msg");
  document.getElementById("showPassword").addEventListener("change", function () {
  const passwordInput = document.getElementById("password");

  if (this.checked) {
    passwordInput.type = "text";
  } else {
    passwordInput.type = "password";
  }
});

  // SIGN UP
  document.getElementById("signupBtn").onclick = () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        msg.innerText = "Account created!";
      })
      .catch((error) => {
        msg.innerText = error.message;
      });
  };

  // LOGIN
  document.getElementById("loginBtn").onclick = () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        msg.innerText = "Logged in!";
      })
      .catch((error) => {
        msg.innerText = error.message;
      });
  };

  // LOGOUT
  document.getElementById("logoutBtn").onclick = () => {
    signOut(auth);
  };

  // AUTH STATE (controls UI)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("auth").style.display = "none";
      document.getElementById("app").style.display = "block";

      document.getElementById("userInfo").innerText =
        "Logged in as: " + user.email;

    } else {
      document.getElementById("auth").style.display = "block";
      document.getElementById("app").style.display = "none";
    }
  });

  console.log("QIKFIN loaded");
</script>

</body>
</html>
