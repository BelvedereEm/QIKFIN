<!DOCTYPE html>
<html>
<head>
  <title>QIKFIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <style>
   * {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: #0f172a;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* CARD */
#auth {
  width: 100%;
  max-width: 340px;
  background: #111c33;
  padding: 24px;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* INPUTS */
.qik-input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #24324d;
  background: #0b1220;
  color: white;
  font-size: 14px;
  box-sizing: border-box;
  -webkit-appearance: none;
  appearance: none;
}

/* PASSWORD ROW */
.password-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.password-row input[type="password"] {
  flex: 1;
  min-width: 0;
}

.password-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  cursor: pointer;
}

#loginBtn {
  background: #38bdf8;
  color: #0f172a;
  font-weight: 600;
}

#signupBtn {
  background: transparent;
  color: white;
  border: 1px solid #2a3b5a;
}

/* TEXT */
h1, h2, h3 {
  color: white;
  margin: 0;
  text-align: center;
}

/* h2 = main brand */
h2 {
  font-size: 28px;
  font-weight: 700;
}

/* h1 = smaller subtitle */
h1 {
  font-size: 14px;
  font-weight: 500;
  opacity: 0.7;
  margin-bottom: -4px;
}

/* optional spacing under header stack */
h3 {
  font-size: 14px;
  font-weight: 500;
  opacity: 0.8;
  margin-top: 6px;
}

#msg {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  text-align: center;
}

   .card {
  background: #111c33;
  padding: 20px;
  border-radius: 16px;
  width: 100%;
  max-width: 340px;
  margin: auto;
  text-align: center;
  color: white;
}

.balance {
  margin: 20px 0;
  padding: 15px;
  border-radius: 12px;
  background: #0b1220;
}
</style>
</head>

<body>

<!-- LOGIN / SIGNUP -->
<div id="auth">
  <h1>Welcome to</h1>
  <h2>QIKFIN</h2>
  <h3>Login or Sign Up</h3>

  <form id="loginForm">

    <input 
  type="email" 
  id="email" 
  name="email"
  class="qik-input" 
  placeholder="Email"
  autocomplete="username"
>

<div class="password-row">
  <input 
    type="password" 
    id="password" 
    name="password"
    class="qik-input" 
    placeholder="Password"
    autocomplete="current-password"
  >

  <input type="checkbox" id="showPassword">
</div>

    <button type="submit" id="loginBtn">Login</button>
    <button type="button" id="signupBtn">Sign Up</button>

    <p id="msg"></p>

  </form>
</div>

  <!-- DASHBOARD / MAIN PAGE -->
  <div id="dashboard" style="display:none;">
  <div class="card">
    <h2>Dashboard</h2>

    <p id="userInfo"></p>

    <div class="balance">
  <h3>Current Balance</h3>
  <p id="currentBalance">$0.00</p>
</div>

<div class="balance">
  <h3>Savings Balance</h3>
  <p id="savingsBalance">$0.00</p>
</div>

<div class="balance">
  <h3>Available Balance</h3>
  <p id="availableBalance">$0.00</p>
</div>

    <div class="balance">
  <h3>Add Transaction</h3>

  <select id="type">
    <option value="expense">Expense</option>
    <option value="income">Income</option>
    <option value="transfer">Transfer</option>
  </select>

  <input id="amount" type="number" placeholder="Amount">

  <input id="category" type="text" placeholder="Category">

  <input id="note" type="text" placeholder="Note">

  <button id="addTxnBtn">Save</button>
</div>
    <button id="logoutBtn">Logout</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
 import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { getFirestore } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app-check.js";
import {
  doc,
  setDoc,
  getDocs, 
  query,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
  
/* =========================
   1. FIREBASE INIT
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyBUxKRW99n3MdM3h5lIthrSLhtysqKOHwE",
  authDomain: "qikfin.firebaseapp.com",
  projectId: "qikfin",
  storageBucket: "qikfin.firebasestorage.app",
  messagingSenderId: "867906265805",
  appId: "1:867906265805:web:fef99742609ce5151e3f84"
};

const app = initializeApp(firebaseConfig);
  initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider("6LeiFs8sAAAAAI4EgcoVTRjQYkRPqeHeeUtyozDu"),
  isTokenAutoRefreshEnabled: true
});

const auth = getAuth(app);
const db = getFirestore(app);


/* =========================
   2. UI ELEMENTS
========================= */
const authScreen = document.getElementById("auth");
const dashboard = document.getElementById("dashboard");
const msg = document.getElementById("msg");
const userInfo = document.getElementById("userInfo");

/* =========================
   3. AUTH FUNCTIONS
========================= */
function signup(email, password) {
  return createUserWithEmailAndPassword(auth, email, password);
}

function login(email, password) {
  return signInWithEmailAndPassword(auth, email, password);
}

function logout() {
  return signOut(auth);
}

/* =========================
   4. UI STATE CONTROLLER
========================= */
function showApp(user) {
  authScreen.style.display = "none";
  dashboard.style.display = "block";
  userInfo.textContent = "Logged in as: " + user.email;
}

function showAuth() {
  authScreen.style.display = "block";
  dashboard.style.display = "none";
  msg.textContent = "";
}

/* =========================
   5. EVENT LISTENERS
========================= */

// LOGIN FORM
document.getElementById("loginForm").addEventListener("submit", (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  login(email, password).catch((err) => {
    msg.textContent = err.message;
  });
});

// SIGN UP
document.getElementById("signupBtn").addEventListener("click", (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signup(email, password)
  .then(async (cred) => {
    const user = cred.user;

    await setDoc(doc(db, "users", user.uid), {
      email: user.email,
      availableBalance: 0,
      currentBalance: 0,
      savingsBalance: 0,
      createdAt: serverTimestamp()
    });

    msg.textContent = "Account created!";
  })
    .catch((err) => {
      msg.textContent = err.message;
    });
});

// LOGOUT
document.getElementById("logoutBtn").addEventListener("click", () => {
  logout();
});

// PASSWORD TOGGLE
document.getElementById("showPassword").addEventListener("change", function () {
  const pw = document.getElementById("password");
  pw.type = this.checked ? "text" : "password";
});

/* =========================
   6. AUTH STATE LISTENER
========================= */
onAuthStateChanged(auth, (user) => {
  if (user) {
    showApp(user);
    calculateBalances(user.uid);
  } else {
    showAuth();
  }
});

  //Balances 
  async function calculateBalances(uid) {
  const txRef = collection(db, "users", uid, "transactions");
  const snapshot = await getDocs(query(txRef));

  let income = 0;
  let expenses = 0;
  let savings = 0;

  snapshot.forEach((doc) => {
    const data = doc.data();

    if (data.type === "income") {
      income += data.amount;
    }

    if (data.type === "expense") {
      expenses += data.amount;
    }

    if (data.type === "transfer") {
      // optional later: handle savings properly
      if (data.to === "savings") savings += data.amount;
      if (data.from === "savings") savings -= data.amount;
    }
  });

  const currentBalance = income - expenses;
  const availableBalance = currentBalance;

  document.getElementById("currentBalance").innerText =
    "$" + currentBalance.toFixed(2);

  document.getElementById("savingsBalance").innerText =
    "$" + savings.toFixed(2);

  document.getElementById("availableBalance").innerText =
    "$" + availableBalance.toFixed(2);
}
  //ADD TRANSACTIONS
async function addTransaction(uid, data) {
  const ref = collection(db, "users", uid, "transactions");
  await addDoc(ref, {
    ...data,
    date: serverTimestamp()
  });
}
document.getElementById("addTxnBtn").addEventListener("click", async () => {
  const user = auth.currentUser;
  if (!user) return;

  const type = document.getElementById("type").value;
  const amount = Number(document.getElementById("amount").value);
  const category = document.getElementById("category").value;
  const note = document.getElementById("note").value;

  if (!amount || amount <= 0) return;

  await addTransaction(user.uid, {
    type,
    amount,
    category,
    note
  });

  console.log("Transaction added");

  // refresh balances immediately
  calculateBalances(user.uid);
});

  console.log("Transaction added");
console.log("QIKFIN app initialized cleanly");
</script>

</body>
</html>
